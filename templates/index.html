<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Advanced Phishing Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="text-center">🔐 Advanced Phishing URL Detector</h1>
      <div class="row justify-content-center mt-4">
        <div class="col-md-8">
          <form method="post" action="/predict">
            <div class="input-group mb-3">
              <input type="text" name="url" class="form-control" placeholder="Enter URL to check" required>
              <button class="btn btn-primary" type="submit">Check URL</button>
            </div>
          </form>
          {% if prediction %}
          <div class="alert alert-info">
            <h5>URL: {{ url }}</h5>
            <p><strong>Prediction:</strong> {{ prediction }} ({{ confidence }}%)</p>
            <p><strong>VirusTotal:</strong> {{ vt }}</p>
            {% if session.user and session.user.role == 'admin' %}
            <a href="/dashboard" class="btn btn-success">Go to Dashboard</a>
            {% else %}
            <a href="/login" class="btn btn-secondary">Admin Login</a>
            {% endif %}
          </div>
          {% endif %}
        </div>
      </div>
    </div>
  </body>
</html>
